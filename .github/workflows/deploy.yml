name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: production
      url: https://promptoptimizer.boomlac.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          npx ng build --configuration production \
            --define __API_KEY__='"'"${API_KEY}"'"'

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}   # replaces FIREBASE_SERVICE_ACCOUNT
          channelId: live
          projectId: societyloops                         # corrected
