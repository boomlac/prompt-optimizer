name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: production   # REQUIRED to access environment secrets

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install   # <-- FIXED (no lock file required)

      - name: Build production
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          npx ng build --configuration production \
            --define __API_KEY__='"'"${API_KEY}"'"'

      - name: Debug FIREBASE_TOKEN
        run: |
          echo "Token length: ${#FIREBASE_TOKEN}"
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "🔥 FIREBASE_TOKEN is EMPTY"
            exit 1
          else
            echo "✅ FIREBASE_TOKEN is PRESENT"
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase Hosting using FIREBASE_TOKEN
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project societyloops
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
