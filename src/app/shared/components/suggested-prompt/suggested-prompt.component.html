<div class="suggested-prompt-section">
  <div class="content-refinement">
    <div class="refined-content">"{{ originalPromptText }}"
      <div class="original-prompt-pill"
        #pillTooltip="matTooltip"
        [matTooltip]="originalPromptText ?? ''"
        matTooltipPosition="above"
        matTooltipClass="full-prompt-tooltip"
        (click)="pillTooltip.toggle(); $event.stopPropagation()"
      >Original Prompt <mat-icon>info</mat-icon></div>
    </div>
  </div>

  <h4><mat-icon>auto_awesome</mat-icon> AI Optimization</h4>
  <div #promptContent
    class="prompt-content"
    [class.edit-mode]="editMode"
    [innerHTML]="formattedPromptText"
    [attr.contenteditable]="editMode ? 'true' : null"
    (click)="startEdit(promptContent)"
    (blur)="finishEdit(promptContent)"
  ></div>

  <div class="prompt-actions">
    <button type="button" mat-stroked-button color="primary" (click)="onReAnalyze()">
      <mat-icon>auto_awesome</mat-icon>
      Re-Analyze
    </button>
    <div class="editable-buttons">
      <button type="button" mat-stroked-button color="primary" (click)="startEdit(promptContent)">
        <mat-icon>edit</mat-icon>
        Edit Prompt
      </button>
      <button type="button" mat-stroked-button color="primary" (click)="copyPrompt()">
        <mat-icon>content_copy</mat-icon>
        Copy Prompt
      </button>
    </div>
  </div>
</div>
